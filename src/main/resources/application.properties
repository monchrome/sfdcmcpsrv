spring.application.name=sfdcmcpsrv

# Configure the MCP Metadata
spring.ai.mcp.server.name=sfdc-java-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# Prevent Spring Boot from opening web ports
spring.main.web-application-type=none
spring.main.banner-mode=off

# Silence console logs and redirect them safely to a file
logging.pattern.console=
logging.file.name=./logs/mcp-server.log

# Salesforce Connection
# orgUrl: login URL used as the JWT audience and OAuth token endpoint.
#   Production: https://login.salesforce.com
#   Sandbox:    https://test.salesforce.com
#   My Domain:  https://<mydomain>.my.salesforce.com
salesforce.org-url=https://orgfarm-5d06a673a8-dev-ed.develop.my.salesforce.com
salesforce.client-id=3MVG9GCMQoQ6rpzTIwZoLy8L58YoZLl9nkfWrkYoltWlhuHPcltl._T0Y5Kn_YUqhh0CK.HRqsqGgWnPk8P6Z
salesforce.integration-username=<replace_with_integration_user>
salesforce.private-key-path=/Users/mon/MyProjects/MCP/SfdcRESTMCP/sfdcmcpsrv/src/main/resources/server.key
# Salesforce REST API version (default: v63.0)
salesforce.api-version=v63.0

# claude --resume 581deeb0-6a88-4b1a-bb43-de763191fed7
# Integration test configuration — loaded when the "test" Spring profile is active.
# These properties are merged on top of application.properties.

# Salesforce user to impersonate during integration tests.
# The integration account (salesforce.integration-username) obtains a token on behalf of this user
# via the JWT Bearer flow. Fill this in before running the integration tests.
salesforce.test-username=<replace_with_user_acct_of_on_behalf_of_user>

# Re-enable console logging so test output is visible on stdout.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.file.name=./logs/mcp-integration-test.log
